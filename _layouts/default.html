<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description | xml_escape }}">
  <meta name="theme-color" content="#1B3A5C">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — Mechanical Design Engineer{% endif %}</title>

  <!-- Open Graph / LinkedIn preview -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="{{ page.url | absolute_url }}">
  <meta property="og:title"       content="{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — Mechanical Design Engineer{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description | xml_escape }}">
  <meta property="og:image"       content="{{ '/images/headshot_photo.jpeg' | absolute_url }}">
  <meta property="og:locale"      content="en_NZ">

  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="{{ site.title }} — Mechanical Design Engineer">
  <meta name="twitter:description" content="{{ site.description | xml_escape }}">
  <meta name="twitter:image"       content="{{ '/images/headshot_photo.jpeg' | absolute_url }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Favicon (add favicon.ico / favicon.svg to repo root to activate) -->
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="alternate icon"            href="{{ '/favicon.ico' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/ha-tran.css' | relative_url }}">
</head>
<body class="layout-{{ page.layout }}">

  <!-- ====== NAVIGATION ====== -->
  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ '/' | relative_url }}" class="nav-brand">Ha Tran</a>

      <!-- Pure-CSS hamburger toggle -->
      <input type="checkbox" id="nav-toggle" class="nav-toggle-input" aria-hidden="true">
      <label for="nav-toggle" class="nav-toggle-label" aria-label="Open navigation">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <ul class="nav-links" role="list">
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/projects/' | relative_url }}"{% if page.url == '/projects/' %} class="active"{% endif %}>Projects</a></li>
        <li><a href="{{ '/skills/' | relative_url }}"{% if page.url == '/skills/' %} class="active"{% endif %}>Skills</a></li>
        <li><a href="{{ '/education/' | relative_url }}"{% if page.url == '/education/' %} class="active"{% endif %}>Education</a></li>
        <li><a href="{{ '/contact/' | relative_url }}"{% if page.url == '/contact/' %} class="active"{% endif %}>Contact</a></li>
        <li><a href="{{ 'Ha Tran - Resume.pdf' | relative_url }}" class="nav-cta" target="_blank" rel="noopener noreferrer">Download CV</a></li>
      </ul>
    </nav>
  </header>

  <!-- ====== MAIN CONTENT ====== -->
  <main class="site-main" id="main-content">
    {{ content }}
  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-brand">
        <strong>Ha Tran</strong>
        <span>Mechanical Design Engineer</span>
      </div>
      <div class="footer-links">
        <a href="mailto:tranbaongocha1101@gmail.com" class="footer-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Email
        </a>
        <a href="https://www.linkedin.com/in/ha-tran-940332154" class="footer-link" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn
        </a>
      </div>
    </div>
    <p class="footer-copy">New Zealand &nbsp;|&nbsp; NZ Citizen &nbsp;|&nbsp; Open to relocation and international opportunities</p>
  </footer>

</body>
</html>
